<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSCAR2 - Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0f1923;color:#e0e0e0;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .login-box{background:#1a2733;border-radius:12px;padding:40px;width:100%;max-width:380px;text-align:center;border:1px solid #263238}
        h1{color:#4fc3f7;font-size:1.4em;margin-bottom:6px}
        .sub{color:#78909c;font-size:0.82em;margin-bottom:24px}
        input[type=password]{width:100%;padding:12px 16px;background:#0f1923;border:1px solid #263238;border-radius:8px;color:#e0e0e0;font-size:1em;margin-bottom:16px;outline:none}
        input[type=password]:focus{border-color:#4fc3f7}
        button{width:100%;padding:12px;background:#1565c0;color:#fff;border:none;border-radius:8px;font-size:1em;font-weight:600;cursor:pointer;transition:background .2s}
        button:hover{background:#1976d2}
        .error{color:#ef5350;font-size:0.85em;margin-bottom:12px}
    </style>
</head>
<body>
    <div class="login-box">
        <h1>OSCAR2</h1>
        <p class="sub">Agent Teams Monitoring System</p>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST" action="/login">
            <input type="hidden" name="next" value="{{ next_url or '/' }}">
            <input type="password" name="password" placeholder="Password" autofocus required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
